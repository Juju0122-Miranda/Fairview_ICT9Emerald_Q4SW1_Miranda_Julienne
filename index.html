<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<title>Q4 Seatwork 1</title>
<style>
    h1{
        text-align: center;
        font-weight: bold;
    }
    #note {
        color: #6c757d; 
        font-style: italic;
        margin-top: 5px;
    }
    #message {
        font-weight: bold;
        margin-top: 10px;
    }
</style>
</head>
<body>

<div class="d-flex justify-content-center align-items-center" style="min-height: 100vh;">
    <div class="card p-4 shadow" style="width: 450px; border-radius: 25px;">
        
        <h1 class="text-center mb-3">Login</h1>

        <!-- Username -->
        <label for="user_" class="form-label">Username</label>
        <input type="text" id="user_" class="form-control mb-3" placeholder="Input username">

        <!-- Password -->
        <label for="pass_" class="form-label">Password</label>
        <input type="password" id="pass_" class="form-control mb-3" placeholder="Input Password">

        <!-- Checkbox -->
        <div class="form-check mb-2">
            <input class="form-check-input" type="checkbox" id="staylog" onclick="messagepop()">
            <label class="form-check-label" for="staylog">Stay logged in</label>
        </div>

        <p id="note" class="text-muted"></p>

        <div class="d-flex justify-content-between mt-3">
            <button class="btn btn-primary w-50 me-2" onclick="loginChecker()">Login</button>
            <button class="btn btn-secondary w-50" type="button" onclick="clearMessage()">Cancel</button>
        </div>

        <div id="message" class="text-center mt-3"></div>

    </div>
</div>  

<script>

    // Show/hide "Stay logged in" message
    function messagepop() {
        let staylog = document.getElementById("staylog").checked;
        let note = document.getElementById("note");

        if (staylog) {
            note.innerHTML = "Your session will be saved on this device";
        } else {
            note.innerHTML = "";
        }
    }

    // Login function
    function loginChecker() {
        let username = document.getElementById("user_").value;
        let password = document.getElementById("pass_").value;

        // Check empty fields
        if (username === "" || password === "") {
            alert("Please fill out the form.");
            return;
        }

        // Check credentials
        if (username === "Jujutm_0211" && password === "hp122_11") {
           alert("Login Successful!");
        } else {
            alert("Invalid Username and/or Password. Please try again.")
        }
    }

    // Clear everything
    function clearMessage() { 
        document.getElementById("message").innerHTML = "";
        document.getElementById("note").innerHTML = "";
        document.getElementById("user_").value = "";
        document.getElementById("pass_").value = "";
        document.getElementById("staylog").checked = false;
    }
</script>

</body>
</html>
